<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page not found · Vamshi Tummala</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --teal: #154d57;
        --ink: #102f35;
        --gold: #d4b896;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
        background: radial-gradient(120% 90% at 80% 10%, rgba(212, 184, 150, 0.12), transparent 55%),
          var(--ink);
        color: #eef3f2;
        font-family: "JetBrains Mono", monospace;
      }
      h1 {
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(5rem, 22vw, 12rem);
        font-weight: 560;
        line-height: 0.9;
        color: #fff;
        letter-spacing: -0.04em;
      }
      .tag {
        color: var(--gold);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
      }
      p {
        color: rgba(238, 243, 242, 0.7);
        margin: 1.25rem 0 2rem;
      }
      a {
        display: inline-block;
        padding: 0.85rem 1.8rem;
        border-radius: 100px;
        background: var(--gold);
        color: var(--ink);
        font-weight: 600;
        text-decoration: none;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      a:hover {
        background: #fff;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div>
      <p class="tag">Error 404</p>
      <h1>404</h1>
      <p>This page wandered off the dashboard. Let's get you back.</p>
      <a href="/">← Back to home</a>
    </div>
  </body>
</html>
